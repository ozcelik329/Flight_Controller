[platformio]
src_dir = src

[env:pico2-debug]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2
framework = arduino
board_build.core = earlephilhower

build_type = debug
build_flags =
    -O0
    -g3
    -DDEBUG
    -DCORE_DEBUG_LEVEL=5
    -D__FREERTOS=1
    -DFREERTOS_ENABLED
    -DconfigCHECK_FOR_STACK_OVERFLOW=2
    -DconfigUSE_MALLOC_FAILED_HOOK=1
    -DMAVLINK_DIALECT=common
    -DUSE_TINYUSB
    -DPIO_FRAMEWORK_ARDUINO_ENABLE_CDC
    -DUSBD_MAX_POWER_MA=500
    -std=gnu++17
    -fstack-usage
    -Wall
    -Wextra
    -Wpedantic
    -Wconversion
    -Wshadow
    -Wdouble-promotion
    -Wformat=2
    -Wno-address-of-packed-member
    -I${platformio.libdeps_dir}/${PIOENV}/c_library_v2
    -I${platformio.libdeps_dir}/${PIOENV}/c_library_v2/common

monitor_speed = 115200
monitor_dtr = 1
monitor_rts = 1
upload_protocol = picotool
lib_ldf_mode = deep+
lib_archive = yes

lib_deps =
    bolderflight/Bolder Flight Systems SBUS @ ^8.1.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    adafruit/Adafruit BusIO @ ^1.17.4
    adafruit/Adafruit HMC5883 Unified @ ^1.2.0
    adafruit/Adafruit BMP085 Unified @ ^1.1.2
    https://github.com/mavlink/c_library_v2.git

